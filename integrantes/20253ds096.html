<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Matrícula</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .contenedor {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(194, 93, 160, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #333333;
            margin-bottom: 20px;
        }
        .datos {
            font-size: 18px;
            color: #555555;
            margin: 10px 0;
            text-align: left;
        }
        .datos span {
            font-weight: bold;
            color: #000000;
        }
        .foto-contenedor {
            margin-top: 20px;
        }
        .foto-contenedor img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #f63bf6;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Mi Matrícula</h1>
        
        <div class="datos">Nombre: <span>Allison Yamilette Maldonado Santiago</span></div>
        
        <div class="datos">Grado y Grupo: <span>3° A</span></div>
        
        <div class="foto-contenedor">
            <img src="../img/mi_foto.jpg" alt="Foto de Matrícula">
        </div>
    </div>

</body>
</html>
