<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20253DS010</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fcf8f9; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background-color: #ffffff;
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(234, 191, 201, 0.3);
            text-align: center;
            max-width: 320px;
            width: 90%;
            border: 1px solid #f5e6e8;
        }
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 4px solid #fcd3de;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
        h1 {
            font-size: 1.3rem;
            color: #333333;
            margin: 10px 0 8px 0;
            font-weight: 600;
            line-height: 1.3;
        }
        h2 {
            font-size: 0.9rem;
            color: #a6808c;
            margin: 0;
            font-weight: 400;
            background-color: #fff0f3;
            padding: 6px 16px;
            border-radius: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="../img/imgMarc.jpg" alt="Foto de Marco Antonio" class="profile-img" />
        
        <h1>Marco Antonio Contreras Carbajal</h1>
        <h2>Grado y Grupo: 3°A</h2>
    </div>

</body>
</html>
